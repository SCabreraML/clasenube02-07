version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "empresa"
    ports:
      - "3350:3306"
  

  app:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - "8081:5000"
    depends_on:
      - db